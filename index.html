<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>HACHI Player</title>

<style>
body {
  margin: 0;
  height: 100vh;
  background: linear-gradient(135deg, #ffffff, #f2f2f2);
  font-family: 'Segoe UI', sans-serif;
  display: flex;
}

/* 左側人物 */
.left {
  width: 40%;
  display: flex;
  justify-content: center;
  align-items: center;
}

.left img {
  width: 80%;
  max-height: 90%;
  object-fit: contain;
}

/* 右側內容 */
.right {
  width: 60%;
  padding: 40px;
  box-sizing: border-box;
  position: relative;
}

/* 簡介 */
.bio {
  position: absolute;
  top: 40px;
  right: 40px;
  width: 300px;
  font-size: 14px;
  color: #555;
}

/* 專輯區 */
.albums {
  position: absolute;
  bottom: 120px;
  right: 40px;
  display: flex;
  gap: 20px;
}

.album {
  width: 120px;
  cursor: pointer;
  text-align: center;
}

.album img {
  width: 100%;
  border-radius: 10px;
  transition: 0.3s;
}

.album img:hover {
  transform: scale(1.1);
}

.album p {
  margin-top: 5px;
  font-size: 12px;
}

/* 播放器 */
.player {
  position: absolute;
  bottom: 40px;
  right: 40px;
  width: 300px;
}

.controls {
  display: flex;
  justify-content: center;
  gap: 15px;
  margin-top: 10px;
}

/* Spotify風按鈕 */
.btn {
  width: 45px;
  height: 45px;
  border-radius: 50%;
  border: none;
  background: #c9a227;
  color: white;
  font-size: 18px;
  cursor: pointer;
  transition: 0.2s;
}

.btn:hover {
  background: #a8891c;
  transform: scale(1.1);
}

/* 進度條 */
.progress-container {
  width: 100%;
  height: 6px;
  background: #ddd;
  margin-top: 10px;
  cursor: pointer;
  border-radius: 5px;
}

.progress {
  height: 100%;
  width: 0%;
  background: #c9a227;
}

.song {
  margin-top: 10px;
  font-size: 14px;
}
</style>
</head>

<body>

<!-- 左側人物 -->
<div class="left">
  <img src="images/hachi.png">
</div>

<!-- 右側 -->
<div class="right">

  <!-- 簡介 -->
  <div class="bio">
    <h3>HACHI</h3>
    <p>
      A virtual singer with a soft and emotional voice.  
      Blending music and visual art into a unique world.
    </p>
  </div>

  <!-- 專輯 -->
  <div class="albums">
    <div class="album" onclick="selectAlbum(0)">
      <img src="images/astra.jpg">
      <p>FOR ASTRA</p>
    </div>

    <div class="album" onclick="selectAlbum(1)">
      <img src="images/revealia.jpg">
      <p>REVEALIA</p>
    </div>
  </div>

  <!-- 播放器 -->
  <div class="player">
    <div class="song" id="songName">Select an album</div>

    <div class="progress-container" onclick="setProgress(event)">
      <div class="progress" id="progress"></div>
    </div>

    <div class="controls">
      <button class="btn" onclick="prevSong()">⏮</button>
      <button class="btn" onclick="playSong()">▶</button>
      <button class="btn" onclick="nextSong()">⏭</button>
    </div>
  </div>

</div>

<audio id="audio"></audio>

<script>
let currentAlbum = null;
let currentTrack = 0;

const albums = [
  {
    name: "FOR ASTRA",
    total: 12,
    path: "music/astra/",
    songs: [
      "Song 1","Song 2","Song 3","Song 4","Song 5","Song 6",
      "Song 7","Song 8","Song 9","Song 10","Song 11","Song 12"
    ]
  },
  {
    name: "REVEALIA",
    total: 13,
    path: "music/revealia/",
    songs: [
      "Song 1","Song 2","Song 3","Song 4","Song 5","Song 6",
      "Song 7","Song 8","Song 9","Song 10","Song 11","Song 12","Song 13"
    ]
  }
];

const audio = document.getElementById("audio");

function selectAlbum(index) {
  currentAlbum = index;
  currentTrack = 0;
  loadSong();
  playSong();
}

function loadSong() {
  const album = albums[currentAlbum];
  audio.src = album.path + (currentTrack + 1) + ".mp3";

  document.getElementById("songName").innerText =
    album.name + " - " + album.songs[currentTrack];
}

function playSong() {
  audio.play();
}

function nextSong() {
  currentTrack++;
  if (currentTrack >= albums[currentAlbum].total) currentTrack = 0;
  loadSong();
  playSong();
}

function prevSong() {
  currentTrack--;
  if (currentTrack < 0) currentTrack = albums[currentAlbum].total - 1;
  loadSong();
  playSong();
}

// 進度條
audio.addEventListener("timeupdate", () => {
  const progress = document.getElementById("progress");
  progress.style.width = (audio.currentTime / audio.duration) * 100 + "%";
});

function setProgress(e) {
  const width = e.currentTarget.clientWidth;
  const clickX = e.offsetX;
  audio.currentTime = (clickX / width) * audio.duration;
}
</script>

</body>
</html>
