<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>HACHI Player</title>

<style>
body {
  margin: 0;
  height: 100vh;
  background: linear-gradient(120deg, #ffffff, #f3f3f3);
  font-family: 'Segoe UI', sans-serif;
  display: flex;
}

/* 左側 */
.left {
  width: 45%;
  display: flex;
  justify-content: center;
  align-items: center;
}

.left img {
  width: 75%;
  object-fit: contain;
}

/* 右側 */
.right {
  width: 55%;
  padding: 50px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}

/* 簡介 */
.bio {
  max-width: 350px;
}

.bio h2 {
  margin-bottom: 10px;
}

.bio p {
  color: #666;
  line-height: 1.6;
}

/* 專輯卡片 */
.albums {
  display: flex;
  gap: 30px;
}

.album {
  width: 150px;
  cursor: pointer;
  transition: 0.3s;
}

.album img {
  width: 100%;
  border-radius: 12px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.15);
}

.album:hover {
  transform: translateY(-10px);
}

.album-title {
  text-align: center;
  margin-top: 8px;
}

/* 播放器 */
.player {
  margin-top: 20px;
}

.song {
  font-size: 15px;
  margin-bottom: 10px;
}

/* 進度條 */
.progress-container {
  height: 6px;
  background: #ddd;
  border-radius: 5px;
  cursor: pointer;
}

.progress {
  height: 100%;
  width: 0%;
  background: #c9a227;
}

/* 按鈕 */
.controls {
  margin-top: 15px;
}

.btn {
  width: 45px;
  height: 45px;
  border-radius: 50%;
  border: none;
  margin-right: 10px;
  background: #c9a227;
  color: white;
  font-size: 18px;
  cursor: pointer;
}

.btn:hover {
  background: #a8891c;
}
</style>
</head>

<body>

<div class="left">
  <img src="images/hachi.png">
</div>

<div class="right">

  <!-- 簡介 -->
  <div class="bio">
    <h2>HACHI</h2>
    <p>
      A virtual singer with emotional and transparent voice.  
      A world where music and visuals blend together.
    </p>
  </div>

  <!-- 專輯 -->
  <div class="albums">
    <div class="album" onclick="selectAlbum(0)">
      <img src="images/astra.jpg">
      <div class="album-title">FOR ASTRA</div>
    </div>

    <div class="album" onclick="selectAlbum(1)">
      <img src="images/revealia.jpg">
      <div class="album-title">REVEALIA</div>
    </div>
  </div>

  <!-- 播放器 -->
  <div class="player">
    <div class="song" id="songName">Click album to play</div>

    <div class="progress-container" onclick="setProgress(event)">
      <div class="progress" id="progress"></div>
    </div>

    <div class="controls">
      <button class="btn" onclick="prevSong()">⏮</button>
      <button class="btn" onclick="playSong()">▶</button>
      <button class="btn" onclick="nextSong()">⏭</button>
    </div>
  </div>

</div>

<audio id="audio"></audio>

<script>
let currentAlbum = null;
let currentTrack = 0;

const albums = [
  {
    name: "FOR ASTRA",
    total: 12,
    path: "music/astra/",
    songs: ["Song 1","Song 2","Song 3","Song 4","Song 5","Song 6",
            "Song 7","Song 8","Song 9","Song 10","Song 11","Song 12"]
  },
  {
    name: "REVEALIA",
    total: 13,
    path: "music/revealia/",
    songs: ["Song 1","Song 2","Song 3","Song 4","Song 5","Song 6",
            "Song 7","Song 8","Song 9","Song 10","Song 11","Song 12","Song 13"]
  }
];

const audio = document.getElementById("audio");

// ⭐ 點擊專輯才播放（解決播放問題）
function selectAlbum(index) {
  currentAlbum = index;
  currentTrack = 0;
  loadSong();
  audio.play().catch(() => alert("請點擊播放按鈕"));
}

function loadSong() {
  const album = albums[currentAlbum];
  audio.src = album.path + (currentTrack + 1) + ".mp3";

  document.getElementById("songName").innerText =
    album.name + " - " + album.songs[currentTrack];
}

function playSong() {
  if (currentAlbum === null) return alert("請先選擇專輯");
  audio.play();
}

function nextSong() {
  if (currentAlbum === null) return;
  currentTrack++;
  if (currentTrack >= albums[currentAlbum].total) currentTrack = 0;
  loadSong();
  audio.play();
}

function prevSong() {
  if (currentAlbum === null) return;
  currentTrack--;
  if (currentTrack < 0) currentTrack = albums[currentAlbum].total - 1;
  loadSong();
  audio.play();
}

// 進度條
audio.addEventListener("timeupdate", () => {
  const progress = document.getElementById("progress");
  progress.style.width = (audio.currentTime / audio.duration) * 100 + "%";
});

function setProgress(e) {
  const width = e.currentTarget.clientWidth;
  const clickX = e.offsetX;
  audio.currentTime = (clickX / width) * audio.duration;
}
</script>

</body>
</html>
