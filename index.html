<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>System Waiting</title>

<style>
body {
  margin: 0;
  height: 100vh;
  background: linear-gradient(135deg, #f5f5f5, #dcdcdc);
  color: #222;
  font-family: 'Segoe UI', sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
}

.container {
  text-align: center;
  position: relative;
}

h1 {
  letter-spacing: 6px;
  font-weight: 300;
  color: #c9a227;
  opacity: 0;
  animation: fadeIn 2s forwards;
}

p {
  color: #666;
  opacity: 0;
  animation: fadeIn 3s forwards;
}

.loader {
  margin-top: 25px;
  border: 3px solid rgba(0,0,0,0.1);
  border-top: 3px solid #c9a227;
  border-radius: 50%;
  width: 45px;
  height: 45px;
  animation: spin 1s linear infinite;
}

.glow-circle {
  position: absolute;
  width: 350px;
  height: 350px;
  background: radial-gradient(circle, #fff8dc, transparent);
  border-radius: 50%;
  filter: blur(80px);
  animation: pulse 5s infinite;
  z-index: -1;
}

/* 音樂按鈕 */
.music-btn {
  margin-top: 30px;
  padding: 10px 20px;
  border: none;
  background: #c9a227;
  color: white;
  border-radius: 20px;
  cursor: pointer;
  transition: 0.3s;
}

.music-btn:hover {
  background: #a8891c;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

@keyframes fadeIn {
  to { opacity: 1; }
}

@keyframes pulse {
  0%,100% { opacity: 0.3; }
  50% { opacity: 0.7; }
}
</style>

</head>
<body>

<div class="container">
  <div class="glow-circle"></div>
  
  <h1 id="title">SYSTEM INITIALIZING</h1>
  <p id="subtitle">Reavilia loading... Please wait</p>

  <div class="loader"></div>

  <button class="music-btn" onclick="playMusic()">🎵 Play Music</button>
</div>

<!-- 音樂 -->
<audio id="bgm" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<script>
function playMusic() {
  const music = document.getElementById("bgm");
  music.play();
}

// 模擬系統狀態變化
setTimeout(() => {
  document.getElementById("title").innerText = "CONNECTED";
  document.getElementById("subtitle").innerText = "Welcome to Reavilia";
}, 5000);
</script>

</body>
</html>
