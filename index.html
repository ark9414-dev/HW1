<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>HACHI Player</title>

<style>
body {
  margin: 0;
  height: 100vh;
  background: linear-gradient(120deg, #ffffff, #f3f3f3);
  font-family: 'Segoe UI', sans-serif;
  display: flex;
  flex-direction: column;
}

/* 頂部提示 */
.header {
  width: 100%;
  text-align: center;
  padding: 10px;
  background: #c9a227;
  color: white;
  font-size: 14px;
}

/* 主體 */
.main {
  display: flex;
  flex: 1;
}

/* 左側 */
.left {
  width: 45%;
  display: flex;
  justify-content: center;
  align-items: center;
}

.left img {
  width: 75%;
}

/* 右側 */
.right {
  width: 55%;
  padding: 50px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}

/* 簡介 */
.bio {
  max-width: 350px;
  line-height: 1.6;
  color: #555;
}

/* 專輯 */
.albums {
  display: flex;
  gap: 30px;
}

.album {
  width: 150px;
  cursor: pointer;
  transition: 0.3s;
}

.album img {
  width: 100%;
  border-radius: 12px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.15);
}

.album:hover {
  transform: translateY(-10px);
}

/* 播放器 */
.player {
  margin-top: 20px;
}

.song {
  margin-bottom: 10px;
}

/* 進度條 */
.progress-container {
  height: 6px;
  background: #ddd;
  border-radius: 5px;
  cursor: pointer;
}

.progress {
  height: 100%;
  width: 0%;
  background: #c9a227;
}

/* 按鈕 */
.controls {
  margin-top: 15px;
}

.btn {
  width: 45px;
  height: 45px;
  border-radius: 50%;
  border: none;
  margin-right: 10px;
  background: #c9a227;
  color: white;
  font-size: 18px;
  cursor: pointer;
}

.btn:hover {
  background: #a8891c;
}
</style>
</head>

<body>

<!-- 頂部提示 -->
<div class="header">
  網站當機出現問題，請稍後重新整理，先聽點音樂放放鬆吧
</div>

<div class="main">

<div class="left">
  <img src="images/hachi.png">
</div>

<div class="right">

  <!-- 簡介 -->
  <div class="bio">
    她以清澈柔美的嗓音，以及充滿情感的詮釋方式，深深打動了聽眾的心。<br><br>
    除了在國內外舉辦巡迴演唱會與線上線下音樂活動外，她也固定於 YouTube 上，每週兩次與粉絲分享音樂直播。<br><br>
    她那直擊人心的純淨歌聲與親切自然的談吐，使她始終與聽眾保持緊密的連結。<br><br>
    2024 年，她正式簽約 King Records 並正式出道。<br><br>
    作為一位持續拓展日本、海外及網路平台版圖的新生代藝術家，她正日益受到廣泛關注。
  </div>

  <!-- 專輯 -->
  <div class="albums">
    <div class="album" onclick="selectAlbum(0)">
      <img src="images/astra.jpg">
      <p>FOR ASTRA</p>
    </div>

    <div class="album" onclick="selectAlbum(1)">
      <img src="images/revealia.jpg">
      <p>REVEALIA</p>
    </div>
  </div>

  <!-- 播放器 -->
  <div class="player">
    <div class="song" id="songName">Click album to play</div>

    <div class="progress-container" onclick="setProgress(event)">
      <div class="progress" id="progress"></div>
    </div>

    <div class="controls">
      <button class="btn" onclick="prevSong()">⏮</button>
      <button class="btn" onclick="togglePlay()">⏯</button>
      <button class="btn" onclick="nextSong()">⏭</button>
    </div>
  </div>

</div>
</div>

<audio id="audio"></audio>

<script>
let currentAlbum = null;
let currentTrack = 0;
let isPlaying = false;

const albums = [
  {
    name: "FOR ASTRA",
    total: 12,
    path: "music/astra/",
    songs: ["Song 1","Song 2","Song 3","Song 4","Song 5","Song 6",
            "Song 7","Song 8","Song 9","Song 10","Song 11","Song 12"]
  },
  {
    name: "REVEALIA",
    total: 13,
    path: "music/revealia/",
    songs: ["Song 1","Song 2","Song 3","Song 4","Song 5","Song 6",
            "Song 7","Song 8","Song 9","Song 10","Song 11","Song 12","Song 13"]
  }
];

const audio = document.getElementById("audio");

function selectAlbum(index) {
  currentAlbum = index;
  currentTrack = 0;
  loadSong();
  playSong();
}

function loadSong() {
  const album = albums[currentAlbum];
  audio.src = album.path + (currentTrack + 1) + ".mp3";

  document.getElementById("songName").innerText =
    album.name + " - " + album.songs[currentTrack];
}

function playSong() {
  audio.play();
  isPlaying = true;
}

function togglePlay() {
  if (currentAlbum === null) return alert("請先選擇專輯");

  if (isPlaying) {
    audio.pause();
    isPlaying = false;
  } else {
    audio.play();
    isPlaying = true;
  }
}

function nextSong() {
  if (currentAlbum === null) return;
  currentTrack++;
  if (currentTrack >= albums[currentAlbum].total) currentTrack = 0;
  loadSong();
  playSong();
}

function prevSong() {
  if (currentAlbum === null) return;
  currentTrack--;
  if (currentTrack < 0) currentTrack = albums[currentAlbum].total - 1;
  loadSong();
  playSong();
}

// 進度條
audio.addEventListener("timeupdate", () => {
  const progress = document.getElementById("progress");
  progress.style.width = (audio.currentTime / audio.duration) * 100 + "%";
});

function setProgress(e) {
  const width = e.currentTarget.clientWidth;
  const clickX = e.offsetX;
  audio.currentTime = (clickX / width) * audio.duration;
}
</script>

</body>
</html>
